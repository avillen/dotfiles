# ── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g history-limit 10000
set -g base-index 0
setw -g pane-base-index 0

# ── Mouse ────────────────────────────────────────────────────────────────────
set -g mouse on
set -g mode-keys vi

# ── Splits ──────────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ─────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resize (vim-style) ──────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window names (managed by shell) ─────────────────────────────────────────
set -g automatic-rename off
set -g allow-rename on
set -g status-left ""
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-length 17
set -g window-status-format " #{=/20:#{b:pane_current_path}} "
set -g window-status-current-format " #{=/20:#{b:pane_current_path}} "
set -g window-status-current-style "bg=colour22,fg=colour231,bold"

# ── Reload config ───────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"
